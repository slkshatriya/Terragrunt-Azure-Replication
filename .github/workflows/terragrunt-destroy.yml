name: "Terragrunt Destroy"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Which environment to destroy?"
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod
      confirm:
        description: "Type DESTROY to confirm"
        required: true
        type: string
      include_automation:
        description: "Also destroy Automation Account & Runbook? (DANGER: Azure soft-deletes for 30 days, blocking the region)"
        required: true
        type: choice
        options:
          - "NO - Keep Automation Account (recommended)"
          - "YES - Destroy Everything (will block region for 30 days)"
        default: "NO - Keep Automation Account (recommended)"

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    name: "Destroy - ${{ github.event.inputs.environment }}"
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'DESTROY'

    defaults:
      run:
        working-directory: environments/${{ github.event.inputs.environment }}

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_USE_OIDC: "true"

    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false

      - name: "Setup Terragrunt"
        uses: autero1/action-terragrunt@v3
        with:
          terragrunt-version: "0.68.9"

      - name: "Terragrunt Init"
        run: terragrunt run-all init --terragrunt-non-interactive

      # SAFE DESTROY: Only destroy managed-identity and logic-app
      # We must ALSO exclude resource-group because Azure cannot delete an RG
      # that still contains resources (automation-account & runbook are kept alive)
      - name: "Destroy Safe Resources (keeps Automation Account, Runbook & Resource Group)"
        if: contains(github.event.inputs.include_automation, 'NO')
        run: |
          terragrunt run-all destroy \
            --terragrunt-non-interactive \
            --terragrunt-exclude-dir automation-account \
            --terragrunt-exclude-dir runbook \
            --terragrunt-exclude-dir resource-group

      # FULL DESTROY: Destroys everything including automation account
      # WARNING: Azure soft-deletes Automation Accounts for 30 days, blocking that region
      - name: "FULL Destroy (including Automation Account - region will be blocked for 30 days!)"
        if: contains(github.event.inputs.include_automation, 'YES')
        run: |
          echo "WARNING: Destroying Automation Account will soft-delete it for 30 days."
          echo "The region used by this account will be BLOCKED for new Automation Accounts."
          echo "You will need to change the region in config before re-applying."
          echo ""
          terragrunt run-all destroy --terragrunt-non-interactive
